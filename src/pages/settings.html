<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
</head>

<body>
    <section class="settings" id="settings-screen">
        <div class="headline-wrapper">
            <h2 class="settings__headline">Settings</h2>
            <img class="underline" src="../../assets/img/underline.png" alt="underline Headline">
        </div>

        <main class="content">

            <form class="form">
                <fieldset class="form__list" id="theme">
                    <legend class="form__list-headline"><img src="../../assets/img/game-theme-icon.png"
                            alt="theme icon">Game Theme</legend>
                    <label class="form__label">
                        <input type="radio" name="theme" value="code">
                        Code theme
                        <div class="line"></div>
                    </label>

                    <label class="form__label">
                        <input type="radio" name="theme" value="gaming">
                        Gaming theme
                        <div class="line"></div>
                    </label>

                    <label class="form__label">
                        <input type="radio" name="theme" value="food">
                        Foods theme
                        <div class="line"></div>
                    </label>
                </fieldset>

                <fieldset class="form__list" id="player">
                    <legend class="form__list-headline"><img src="../../assets/img/choose-player-icon.png"
                            alt="player icon">Choose Player</legend>
                    <label class="form__label">
                        <input type="radio" name="player" value="blue">
                        Blue
                        <div class="line"></div>
                    </label>

                    <label class="form__label">
                        <input type="radio" name="player" value="orange">
                        Orange
                        <div class="line"></div>
                    </label>
                </fieldset>

                <fieldset class="form__list" id="field">
                    <legend class="form__list-headline"><img src="../../assets/img/board-size-icon.png"
                            alt="board icon">Board size</legend>
                    <label class="form__label">
                        <input type="radio" name="field" value="16">
                        16 cards
                        <div class="line"></div>
                    </label>

                    <label class="form__label">
                        <input type="radio" name="field" value="24">
                        24 cards
                        <div class="line"></div>
                    </label>

                    <label class="form__label">
                        <input type="radio" name="field" value="36">
                        36 cards
                        <div class="line"></div>
                    </label>
                </fieldset>
            </form>

            <div class="selection-wrapper" id="settings">
        
            </div>
            
        </main>




    </section>

    <script type="module" src="../scripts/settings.ts"></script>
</body>

</html>
