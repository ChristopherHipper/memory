<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
</head>

<body>
    <section class="start" id="start-screen">
        <p class="start__text">It's play time.</p>
        <h1 class="start__headline">Ready to play?</h1>
        <button id="start-btn" class="start-game-btn">
            <img class="controler" src="./assets/img/btn-controler.png" alt="controler">
            Play
            <img class="arrow" src="./assets/img/btn-arrow.png" alt="arrow">
        </button>
        <img class="bg-controler" src="./assets/img/start-screen-controler.png" alt="controler background">
    </section>

    <section class="settings hidden" id="settings-screen">
        <div class="headline-wrapper">
            <h2 class="settings__headline">Settings</h2>
            <img class="underline" src="./assets/img/underline.png" alt="underline Headline">
        </div>

        <div class="content">
            <nav>
                <div class="nav-headline">
                    <img src="./assets/img/game-theme-icon.png" alt="theme icon">
                    <h3>Game Theme</h3>
                </div>
                <ul>
                    <li>
                        <div class="list-style"></div> Code vibes theme <div class="list-line"></div>
                    </li>
                    <li>
                        <div class="list-style"></div>Gaming theme <div class="list-line"></div>
                    </li>
                    <li>
                        <div class="list-style"></div>Foods theme <div class="list-line"></div>
                    </li>
                </ul>

                <div class="nav-headline">
                    <img src="./assets/img/choose-player-icon.png" alt="player icon">
                    <h3>Choose Player</h3>
                </div>
                <ul>
                    <li>
                        <div class="list-style"></div>Blue <div class="list-line"></div>
                    </li>
                    <li>
                        <div class="list-style"></div>Orange <div class="list-line"></div>
                    </li>
                </ul>

                <div class="nav-headline">
                    <img src="./assets/img/board-size-icon.png" alt="board icon">
                    <h3>Board size</h3>
                </div>
                <ul>
                    <li>
                        <div class="list-style"></div>16 cards <div class="list-line"></div>
                    </li>
                    <li>
                        <div class="list-style"></div>24 crads <div class="list-line"></div>
                    </li>
                    <li>
                        <div class="list-style"></div>36 cards <div class="list-line"></div>
                    </li>
                </ul>
            </nav>
            <div class="selection-wrapper">
                <img class="preview-theme" src="./assets/img/coding-theme.png" alt="choosen Theme">
                <div class="choosen-settings">
                    <p>Game theme</p>
                    <img class="seperator" src="./assets/img/seperator.png" alt="seperator">
                    <p>Player</p>
                    <img class="seperator" src="./assets/img/seperator.png" alt="seperator">
                    <p>Board size</p>
                    <button class="start-game-btn play-btn">
                        <img class="controler" src="./assets/img/start.png" alt="start">
                        Start
                    </button>
                </div>
            </div>
        </div>

    </section>

    <section class="game-screen hidden" id="game-screen">

    </section>

    <script type="module" src="./src/main.ts"></script>
</body>

</html>
